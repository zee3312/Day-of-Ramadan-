<!DOCTYPE html>
<html>
<head>
<title>Ramadan Counter</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background-color: #0f172a;
    background-image:
        radial-gradient(circle at 50% 50%, rgba(201,161,59,0.1) 0%, transparent 80%),
        url("https://www.transparenttextures.com");
    background-size: cover;
}

.content {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
}

.days-only {
    font-size: 110px; /* slightly smaller */
    font-weight: 900;
    color: #f3ce7a;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 60px 100px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0px 25px 50px rgba(0,0,0,0.8),
                inset 0 0 20px rgba(201,161,59,0.2);
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
    min-width: 800px;
    letter-spacing: -1px;
}

.prayer-info {
    display:block;
    font-size:38px;
    margin-top:18px;
    font-weight:700;
}

.days-only::before {
    content: "🌙";
    display: block;
    font-size: 55px;
    margin-bottom: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="content">
<div class="days-only" id="days">Loading...</div>
</div>

<script>
function updateRamadan(){

const startDate = new Date("February 19, 2026 00:00:00").getTime();
const now = new Date().getTime();
const diff = now - startDate;

let ramadanText;

if(diff < 0){
    ramadanText = "Ramadan <br> Upcoming";
}
else{

    const currentDay = Math.floor(diff/(1000*60*60*24))+1;

    if(currentDay <= 30){
        ramadanText = "Day " + currentDay + "<br>of Ramadan";
    }
    else{
        ramadanText = "Eid Mubarak!";
    }

}

document.getElementById("days").innerHTML =
ramadanText +
"<span class='prayer-info'>Tahajjud Prayer Starts 4:00 AM</span>" +
"<span class='prayer-info'>Fajr Prayer 10 Minutes After Fajr Adhan</span>";

}

updateRamadan();
setInterval(updateRamadan,60000);
</script>

</body>
</html>
